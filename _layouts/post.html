---
layout: default
---

<article class="post">
  <h1>{{ page.title }}</h1>
  {% if page.subtitle %}
  <p class="subtitle">{{ page.subtitle }}</p>
  {% endif %}

  <div class="entry">
    {{ content }}
  </div>

  <div class="date">
    Written on {{ page.date | date: "%B %e, %Y" }}
  </div>

  {% if site.giscus %}
    {% include giscus.html %}
  {% elsif site.disqus %}
    {% include disqus.html %}
  {% endif %}
</article>
